version: 2

models:
  - name: stg_sales
    description: "Incrementally loaded staging sales data"

    columns:
      - name: order_id
        description: "Primary key for orders"
        tests:
          - unique
          - not_null

      - name: order_date
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: total_amount
        tests:
          - not_null